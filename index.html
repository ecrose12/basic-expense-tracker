<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OKCoders Expense Tracker</title>
    <!-- put favicon here  -->
     <link rel="icon" href="/favicon.ico" sizes="any">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body id="body">
    <div class="container text-center">
      <h1 class="my-5">Expense Tracker</h1>
      <div class="row">
        <div class="col-12 col-md-6">
          <div class="card shadow-sm mb-3">
            <div class="card-body">
              <form id="expense-form">
                <div class="mb-3">
                  <label
                    for="description"
                    class="form-label fw-bold text-secondary"
                    >Description</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="description"
                    placeholder="What did you spend money on?"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="amount" class="form-label fw-bold text-secondary"
                    >Amount ($)</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="amount"
                    placeholder="0.00"
                    step="0.01"
                    min="0.01"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label
                    for="category"
                    class="form-label fw-bold text-secondary"
                    >Category</label
                  >
                  <select class="form-select" id="category" required>
                     <!-- dynamically add category options  -->
                      
                  </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Add Expense
                </button>
              </form>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="card shadow-sm">
            <div class="card-body table-responsive" id="expense-list">
              <table class="table table-striped mb-0">
                <thead>
                  <tr class="text-secondary">
                    <th scope="col">#</th>
                    <th scope="col">Date</th>
                    <th scope="col">Description</th>
                    <th scope="col">Category</th>
                    <th scope="col">Amount</th>
                    <th scope="col"></th>
                  </tr>
                </thead>
                <tbody id="expense-tbody">
                  <tr>
                    <td colspan="6" class="text-center text-muted py-5">
                      No expenses yet!
                    </td>
                  </tr>
                </tbody>
                <tfoot>
                  <tr class="fw-bold">
                    <td>Total</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td id="total">$0.00</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
